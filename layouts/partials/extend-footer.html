<div class="fixed inset-x-0 top-0 -z-10">
  <img
    id="background-image"
    class="nozoom mt-0 mr-0 mb-0 ml-0 h-screen w-full object-cover"
    src="/background.jpg"
    role="presentation"
  />
  <div
    class="from-neutral absolute inset-0 h-screen bg-gradient-to-t to-transparent mix-blend-normal dark:from-neutral-800"
  ></div>
  <div
    class="from-neutral absolute inset-0 h-screen bg-gradient-to-t to-neutral-100 opacity-60 mix-blend-normal dark:from-neutral-800 dark:to-neutral-800"
  ></div>
</div>

<div
  id="background-blur"
  class="fixed opacity-0 inset-x-0 top-0 h-full single_hero_background nozoom backdrop-blur-xl bg-neutral-100/75 dark:bg-neutral-800/60"
></div>

{{ $backgroundBlur := resources.Get "js/background-blur.js" }} {{
$backgroundBlur = $backgroundBlur | resources.Minify | resources.Fingerprint }}
<script
  type="text/javascript"
  src="{{ $backgroundBlur.RelPermalink }}"
  integrity="{{ $backgroundBlur.Data.Integrity }}"
  data-blur-id="background-blur"
  data-image-id="background-image"
></script>
