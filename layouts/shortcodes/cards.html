{{ $section := .Get "section" }}
{{ $limit := .Get "limit" | default 100 }}
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 not-prose my-6">
  {{ range first $limit (where .Page.Site.RegularPages "Section" $section) }}
    <div class="border border-neutral-300 dark:border-neutral-600 rounded-xl p-5 hover:shadow-lg hover:border-primary-400 transition-all">
      <h3 class="text-base font-semibold mb-2">
        <a href="{{ .RelPermalink }}" class="text-primary-600 dark:text-primary-400 hover:underline">{{ .Title }}</a>
      </h3>
      <p class="text-sm text-neutral-500 dark:text-neutral-400 mb-4">{{ .Description }}</p>
      <a href="{{ .RelPermalink }}" class="text-xs text-primary-500 hover:underline">Read more →</a>
    </div>
  {{ end }}
</div>
